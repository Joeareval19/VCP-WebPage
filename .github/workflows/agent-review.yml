name: AI Review Audit

# Independent AI auditor for the Review column.
# Triggers:
#  1. pull_request opened/reopened/ready  -> native, fires the moment an agent
#     (or human) opens a PR — same moment the card lands in Review
#  2. repository_dispatch `card-review`   -> relay fires it when a card is
#     dragged into Review (re-review path, dedup'd by verdict labels)
#  3. workflow_dispatch                   -> force a fresh audit on any PR
on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  repository_dispatch:
    types: [card-review]
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to audit"
        required: true

concurrency:
  group: ai-review-${{ github.event.inputs.pr || github.event.client_payload.pr || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    if: github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'skip-ai-review')
    runs-on: [self-hosted, vcp-laptop]
    timeout-minutes: 30
    steps:
      - name: Resolve PR number
        id: t
        shell: powershell
        run: |
          $p = "${{ github.event.inputs.pr }}"
          if (-not $p) { $p = "${{ github.event.client_payload.pr }}" }
          if (-not $p) { $p = "${{ github.event.pull_request.number }}" }
          if (-not $p) { throw "No PR number resolved" }
          "number=$p" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out the PR branch
        shell: powershell
        env:
          GH_TOKEN: ""
        run: |
          $p = "${{ steps.t.outputs.number }}"
          gh pr checkout $p --repo Joeareval19/VCP-WebPage
          git log --oneline -1

      # The machine layer: registered CI checks + local lint/build/test on
      # the PR branch. Sterling ingests this log BEFORE reading the diff.
      #
      # IMPORTANT: this step only LOGS the results of gh pr checks / npm run
      # *, it never gates on them (the log itself, ingested by Sterling, is
      # what enforces "failing machine check caps the verdict"). Every native
      # command below can legitimately return non-zero — `gh pr checks` in
      # particular ALWAYS reports this very audit run as pending/failing
      # (it's a registered check on itself, mid-run) — so $LASTEXITCODE is
      # explicitly reset to 0 after each one. Without this, PowerShell/Actions
      # attributes an earlier command's non-zero exit code to the whole step,
      # which crashed 100% of audit runs before this fix (see #19).
      - name: Run machine checks (lint / build / tests)
        shell: powershell
        env:
          GH_TOKEN: ""
        run: |
          # This step is log-only by design (see comment above) — it must
          # never inherit the runner's default Stop preference. Under Stop,
          # 2>&1 on a native command whose stderr has content (e.g. `gh pr
          # checks` on a PR with zero check runs, or any gh auth/network
          # error) raises a terminating NativeCommandError at that line,
          # skipping every $LASTEXITCODE reset below it. Found by Sterling's
          # audit of PR #20 (BLOCKER), reproduced live against PR #8.
          $ErrorActionPreference = "Continue"
          $p = "${{ steps.t.outputs.number }}"
          $log = Join-Path $env:RUNNER_TEMP "audit-machine.log"
          "=== gh pr checks (registered CI) ===" | Out-File $log -Encoding utf8
          $checks = gh pr checks $p --repo Joeareval19/VCP-WebPage 2>&1 | Out-String
          $global:LASTEXITCODE = 0
          if (-not $checks.Trim()) { $checks = "no checks reported" }
          $checks | Out-File $log -Append -Encoding utf8
          "" | Out-File $log -Append -Encoding utf8
          "=== local lint/build/test on PR branch ===" | Out-File $log -Append -Encoding utf8
          if (Test-Path package.json) {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            $ran = $false
            foreach ($script in @("lint","build","test")) {
              if ($pkg.scripts -and $pkg.scripts.PSObject.Properties.Name -contains $script) {
                $ran = $true
                "--- npm run $script ---" | Out-File $log -Append -Encoding utf8
                npm install --no-audit --no-fund 2>&1 | Select-Object -Last 2 | Out-File $log -Append -Encoding utf8
                $global:LASTEXITCODE = 0
                npm run $script 2>&1 | Out-File $log -Append -Encoding utf8
                "exit code: $LASTEXITCODE" | Out-File $log -Append -Encoding utf8
                $global:LASTEXITCODE = 0
              }
            }
            if (-not $ran) { "package.json present but no lint/build/test scripts" | Out-File $log -Append -Encoding utf8 }
          } else {
            "No package.json - no local lint configured yet (pre-#9)" | Out-File $log -Append -Encoding utf8
          }
          "machine_log=$log" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Get-Content $log
          exit 0
        id: machine

      - name: Run Sterling (auditor agent)
        shell: powershell
        env:
          GH_TOKEN: ""
        run: |
          $p = "${{ steps.t.outputs.number }}"
          $log = "${{ steps.machine.outputs.machine_log }}"
          $prompt = @(
            "You are Sterling, VCP's Chief Auditor, auditing PR #$p in Joeareval19/VCP-WebPage.",
            "",
            "FIRST ACTION: Read auditor/CLAUDE.md in this checkout - it is your identity and operating manual, and it is binding. Read the skill files it points to when their triggers apply.",
            "",
            "The machine-check log (lint/build/tests/CI, already run against the PR branch) is at: $log",
            "Per your charter: ingest it before reading the diff. A failing machine check caps the verdict at CHANGES REQUESTED.",
            "",
            "The PR branch is already checked out in this workspace. main is available for comparison (git diff main..., git show main:<file>).",
            "Deliver per your charter: exactly one PR comment (gh pr comment) and exactly one verdict label (ai-approved or ai-changes-requested via gh pr edit --add-label)."
          ) -join "`n"
          claude -p $prompt --dangerously-skip-permissions --max-turns 80
          if ($LASTEXITCODE -ne 0) {
            Write-Host "First attempt failed ($LASTEXITCODE). Retrying in 30s..."
            Start-Sleep 30
            claude -p $prompt --dangerously-skip-permissions --max-turns 80
            if ($LASTEXITCODE -ne 0) { throw "auditor exited $LASTEXITCODE after retry" }
          }

      # Sterling wrote `Score: <n>/100` in audits/PR-<n>-audit.md and pushed it
      # to the PR branch. Publish the audit results everywhere review happens:
      # the color-coded `review` label on the PR, a brief summary comment on
      # the linked issue, and the board item's Score field (#24).
      - name: Publish audit results
        shell: powershell
        env:
          GH_TOKEN: ""
        run: |
          # Publish-only step - never inherit the runner's Stop preference:
          # git/gh stderr under 2>&1 raises NativeCommandError and crashed
          # this step on every run (same disease as #19, found on PR #22).
          $ErrorActionPreference = "Continue"
          $p = "${{ steps.t.outputs.number }}"
          git pull origin HEAD 2>&1 | Out-Null
          $global:LASTEXITCODE = 0
          $report = "audits/PR-$p-audit.md"
          if (-not (Test-Path $report)) { Write-Host "No report file - skipping publish"; exit 0 }
          $mScore = Select-String -Path $report -Pattern 'Score:\s*(\d+)\s*/\s*100' | Select-Object -First 1
          $mVerdict = Select-String -Path $report -Pattern 'Verdict:\s*(.+)' | Select-Object -First 1
          if (-not $mScore -or -not $mVerdict) { Write-Host "No Verdict/Score line found - skipping publish"; exit 0 }
          $score = [int]$mScore.Matches[0].Groups[1].Value
          $verdict = $mVerdict.Matches[0].Groups[1].Value.Trim()

          # Verdict label on the PR. `review` is ONE repo-wide label: its
          # color tracks the LATEST audit verdict (green pass / red fail),
          # so two PRs cannot show different colors at the same time.
          $color = "B60205"
          if ($verdict -match 'LGTM') { $color = "0E8A16" }
          gh label create review --repo Joeareval19/VCP-WebPage --color $color --description "AI audit verdict: green = high-trust pass, red = failed" 2>&1 | Out-Null
          $global:LASTEXITCODE = 0
          gh label edit review --repo Joeareval19/VCP-WebPage --color $color 2>&1 | Out-Null
          $global:LASTEXITCODE = 0
          gh pr edit $p --repo Joeareval19/VCP-WebPage --add-label review 2>&1 | Out-Null
          $global:LASTEXITCODE = 0
          Write-Host "review label -> $color ($verdict)"

          # find the linked issue from the PR body (Closes #N)
          $body = gh pr view $p --repo Joeareval19/VCP-WebPage --json body --jq '.body'
          if ($body -match '[Cc]loses?\s+#(\d+)') { $n = $Matches[1] } else { Write-Host "No linked issue - skipping comment + score"; exit 0 }

          # Brief audit summary on the ticket - one comment per audit run
          $comment = "**Sterling audit** - PR #${p}: $verdict, $score/100.`nChecked: machine checks (CI/lint), spec acceptance criteria, stress tests, integrity sweep, security.`nHow: exercised on the PR branch, diffed against main. Full report: audits/PR-$p-audit.md (PR branch)."
          gh issue comment $n --repo Joeareval19/VCP-WebPage --body $comment
          $global:LASTEXITCODE = 0

          $issueId = gh api repos/Joeareval19/VCP-WebPage/issues/$n --jq '.node_id'
          $itemId = gh api graphql -f query="mutation { addProjectV2ItemById(input: {projectId: \`"PVT_kwHOBdoj_c4BcT54\`", contentId: \`"$issueId\`"}) { item { id } } }" --jq '.data.addProjectV2ItemById.item.id'
          gh api graphql -f query="mutation { updateProjectV2ItemFieldValue(input: {projectId: \`"PVT_kwHOBdoj_c4BcT54\`", itemId: \`"$itemId\`", fieldId: \`"PVTF_lAHOBdoj_c4BcT54zhXDFyA\`", value: {number: $score}}) { projectV2Item { id } } }" | Out-Null
          Write-Host "Board item for issue #$n scored: $score/100"
          exit 0

      - name: Report failure on the PR
        if: failure()
        shell: powershell
        env:
          GH_TOKEN: ""
        run: |
          $p = "${{ steps.t.outputs.number }}"
          gh pr comment $p --repo Joeareval19/VCP-WebPage --body "AI audit failed to complete: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
