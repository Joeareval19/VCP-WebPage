name: Board Integrity Sweep

# Reconciliation net for the board (#26 Completed pass, #37 Started pass).
# The relay merge guard (#21) bounces bad drags it RECEIVES — but the smee.io
# webhook transport drops events (observed 2026-07-04: an approval drag on
# issue #2 reached nobody; PR #22 sat open under a "Completed" card), and PRs
# opened by local fan-out sessions never get a board move at all (observed
# 2026-07-04: #3/#4/#5/#29/#30 stuck in Started with open PRs). Invariants
# enforced every 5 minutes, regardless of how a card got where it is:
#   - a card may only REST in Completed if its issue is closed or its work
#     actually merged; resting there with a mergeable PR is a dropped-webhook
#     approval and gets MERGED (squash, branch deleted); only unmergeable
#     work bounces to Review with one comment (#47)
#   - a card in Started whose issue has an open `Closes #N` PR belongs in
#     Review (the work is done and awaiting review) — moved, log-only
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: completed-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: [self-hosted, vcp-laptop]
    timeout-minutes: 10
    steps:
      - name: Reconcile board columns with repo reality
        shell: powershell
        env:
          GH_TOKEN: ""
        run: |
          $ErrorActionPreference = "Stop"
          $projectId = "PVT_kwHOBdoj_c4BcT54"
          $statusFieldId = "PVTSSF_lAHOBdoj_c4BcT54zhW9rGs"
          $reviewOption = "18317928"
          $repo = "Joeareval19/VCP-WebPage"

          # GraphQL VARIABLES, not string interpolation: PS 5.1 strips embedded
          # double quotes when passing args to native executables, so any query
          # text containing "..." literals reaches gh mangled and fails
          # (execution-verified by Sterling on PR #27; same latent bug was
          # silently no-op'ing the #17 audit sweep). Variables keep the query
          # text quote-free.
          $query = @'
          query($pid: ID!, $fname: String!) {
            node(id: $pid) {
              ... on ProjectV2 {
                items(first: 100) {
                  nodes {
                    id
                    updatedAt
                    content {
                      ... on Issue { number state }
                    }
                    fieldValueByName(name: $fname) {
                      ... on ProjectV2ItemFieldSingleSelectValue { name }
                    }
                  }
                }
              }
            }
          }
          '@

          $items = gh api graphql -f query=$query -f pid=$projectId -f fname=Status | ConvertFrom-Json
          if (-not $items -or -not $items.data.node) { throw "Board query failed - gh returned no data (see stderr above)" }
          $nodes = $items.data.node.items.nodes

          # Grace window (Completed pass only): skip items touched in the last
          # 3 minutes so an in-flight relay merge is not raced. updatedAt moves
          # on any item edit, so this is best-effort - a late bounce is fine.
          $cutoff = (Get-Date).ToUniversalTime().AddMinutes(-3)
          $completedSuspects = @($nodes | Where-Object {
            $_.fieldValueByName.name -eq "Completed" -and $_.content.state -eq "OPEN" -and
            [datetime]::Parse($_.updatedAt).ToUniversalTime() -lt $cutoff
          })
          $startedItems = @($nodes | Where-Object {
            $_.fieldValueByName.name -eq "Started" -and $_.content.state -eq "OPEN"
          })

          if ($completedSuspects.Count -eq 0 -and $startedItems.Count -eq 0) {
            Write-Host "Board is honest - nothing to sweep."
            exit 0
          }

          $openPrs = gh pr list --repo $repo --state open --json number,title,body | ConvertFrom-Json

          function Find-Pr($list, $n) {
            $rx = "close[sd]?\s+#$n\b"
            return $list | Where-Object {
              ($_.body -and $_.body -match $rx) -or ($_.title -like "*(#$n)*")
            } | Select-Object -First 1
          }

          $mutation = 'mutation($pid: ID!, $iid: ID!, $fid: ID!, $oid: String!) { updateProjectV2ItemFieldValue(input: {projectId: $pid, itemId: $iid, fieldId: $fid, value: {singleSelectOptionId: $oid}}) { projectV2Item { id } } }'

          # --- Pass 1 (#26/#47): Completed cards with an OPEN issue ---
          # Resting in Completed is an APPROVAL (the drag is the approval act;
          # the webhook that should have merged it was dropped). Honor it:
          # merge when merging is possible, bounce to Review only when it is
          # not (owner directive, #47).
          if ($completedSuspects.Count -gt 0) {
            $mergedPrs = gh pr list --repo $repo --state merged --limit 100 --json number,title,body | ConvertFrom-Json
            foreach ($item in $completedSuspects) {
              $n = $item.content.number
              $openPr = Find-Pr $openPrs $n

              if (-not $openPr) {
                # Merged-but-open safeguard: if a MERGED PR closes this issue,
                # the work IS merged - the issue just didn't auto-close. Rest.
                $mergedPr = Find-Pr $mergedPrs $n
                if ($mergedPr) {
                  Write-Host "Issue #$n - PR #$($mergedPr.number) already merged (issue open); leaving card."
                  continue
                }
                $reason = "Card was resting in **Completed**, but no PR closes this issue - nothing was merged. Bounced back to **Review**. Open a PR with ``Closes #$n`` (or merge the existing work), then drag to Completed again."
                $logLine = "BOUNCE #${n}: rested in Completed with no PR -> Review"
              } else {
                # Only a definite CONFLICTING short-circuits; any other
                # mergeable state proceeds to the guarded merge attempt.
                $view = gh pr view $($openPr.number) --repo $repo --json mergeable,mergeStateStatus | ConvertFrom-Json
                if ($view.mergeable -ne "CONFLICTING") {
                  # No stderr redirection here: under Stop, 2>&1 on a failing
                  # native command raises NativeCommandError (#19). Failure is
                  # detected via the exit code instead; stderr goes to the log.
                  gh pr merge $($openPr.number) --repo $repo --squash --delete-branch
                  $mergeExit = $LASTEXITCODE
                  $global:LASTEXITCODE = 0
                  if ($mergeExit -eq 0) {
                    Write-Host "MERGED PR #$($openPr.number) for issue #$n (approval honored by sweep); branch deleted"
                    continue
                  }
                  $reason = "Approval honored late (the merge webhook was dropped), but merging PR #$($openPr.number) **failed** (exit $mergeExit - see the sweep run log). Bounced back to **Review** - fix the blocker, then drag to Completed again."
                  $logLine = "BOUNCE #${n}: sweep merge of PR #$($openPr.number) failed (exit $mergeExit) -> Review"
                } else {
                  $reason = "Approval received, but PR #$($openPr.number) has **merge conflicts with main** (state: $($view.mergeStateStatus)). Bounced back to **Review** - resolve the conflicts, then drag to Completed again."
                  $logLine = "BOUNCE #${n}: rested in Completed with CONFLICTING PR #$($openPr.number) -> Review"
                }
              }

              gh api graphql -f query=$mutation -f pid=$projectId -f iid=$($item.id) -f fid=$statusFieldId -f oid=$reviewOption | Out-Null
              gh issue comment $n --repo $repo --body $reason
              Write-Host $logLine
            }
          }

          # --- Pass 2 (#37): Started cards with an open PR -> Review ---
          # Routine sync, not a fault: log-only, no issue comment. The audit
          # sweep picks the card up in Review and Sterling's summary comment
          # (#24) provides the ticket-side visibility.
          foreach ($item in $startedItems) {
            $n = $item.content.number
            $openPr = Find-Pr $openPrs $n
            if (-not $openPr) { continue }
            gh api graphql -f query=$mutation -f pid=$projectId -f iid=$($item.id) -f fid=$statusFieldId -f oid=$reviewOption | Out-Null
            Write-Host "SYNC #${n}: Started with open PR #$($openPr.number) -> Review"
          }
